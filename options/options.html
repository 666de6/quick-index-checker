<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Index Checker — Options</title>
  <style>
    :root {
      --primary: #767F9E;
      --bg: #E8DDB4;
      --text: #1f1f1f;
      --text-muted: #5f6368;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 40px;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: var(--text-muted); font-size: 14px; }
    hr { border: none; border-top: 1px solid #d0c8a8; margin: 24px 0; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; }
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d0c8a8;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .note { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Quick Index Checker</h1>
  <p>v1.0.0 — Free &amp; Private. No signup required.</p>
  <hr>
  <p>
    This extension runs entirely in your browser. No data is collected, stored, or sent to any server except
    Google's search engine (to check indexing status).
  </p>
  <p style="margin-top:16px">
    <a href="https://ada666de6.github.io/quick-index-checker/privacy" target="_blank">Privacy Policy</a>
  </p>
</body>
</html>
